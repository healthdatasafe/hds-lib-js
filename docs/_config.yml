title: HDS JavaScript Library
description: Generic toolkit for server and web applications — Health Data Safe
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Navigation order (used by layouts/templates)
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started
  - title: Settings
    url: /settings
  - title: HDS Model
    url: /hds-model
  - title: App Templates
    url: /app-templates
  - title: Localization
    url: /localization
  - title: Toolkit
    url: /toolkit
  - title: Utilities
    url: /utilities

exclude:
  - MAINTAIN-DOC.md
  - Gemfile
  - Gemfile.lock
